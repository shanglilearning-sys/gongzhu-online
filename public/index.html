<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>嘉铭赞助版拱猪</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="entry" class="entry-screen">
        <div class="brand">
          <p class="eyebrow">四人联机纸牌</p>
          <h1>嘉铭赞助版拱猪</h1>
          <p class="summary">创建房间，把房间码发给朋友，四个浏览器即可远程开局。</p>
        </div>
        <form id="join-form" class="join-panel">
          <label>
            <span>昵称</span>
            <input id="name-input" maxlength="16" autocomplete="nickname" placeholder="玩家" />
          </label>
          <label>
            <span>房间码</span>
            <input id="code-input" maxlength="4" autocomplete="off" placeholder="留空则创建" />
          </label>
          <div class="actions">
            <button id="create-button" type="button">创建房间</button>
            <button id="join-button" type="submit" class="join-submit">加入房间</button>
          </div>
          <p id="entry-error" class="error" aria-live="polite"></p>
        </form>
      </section>

      <section id="game" class="game-screen hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">房间 <span id="room-code">----</span></p>
            <h2 id="phase-title">等待玩家</h2>
          </div>
          <div class="topbar-actions">
            <label class="scale-control" for="ui-scale">
              <span>画面大小</span>
              <input id="ui-scale" type="range" min="82" max="112" value="100" />
              <output id="ui-scale-value">100%</output>
            </label>
            <button id="history-button" type="button" class="secondary">历史</button>
            <button id="rules-button" type="button" class="secondary">规则</button>
            <button id="speaker-button" type="button" class="secondary">开启听筒</button>
            <button id="mic-button" type="button" class="secondary">开启麦克风</button>
            <button id="copy-link" type="button" class="secondary">复制邀请链接</button>
            <button id="start-button" type="button">开始</button>
            <button id="finish-expose-button" type="button" class="secondary hidden">结束卖牌</button>
            <button id="new-round-button" type="button" class="secondary hidden">下一局</button>
          </div>
        </header>

        <section class="score-strip" id="score-strip"></section>

        <section class="table-wrap">
          <div class="player-slot slot-north" data-view-pos="north"></div>
          <div class="player-slot slot-west" data-view-pos="west"></div>
          <div class="table">
            <div id="status-line" class="status-line"></div>
            <div id="trick-area" class="trick-area"></div>
            <div id="last-trick" class="last-trick"></div>
          </div>
          <div class="player-slot slot-east" data-view-pos="east"></div>
          <div class="player-slot slot-south" data-view-pos="south"></div>
        </section>

        <section class="hand-panel">
          <div class="hand-heading">
            <div>
              <p class="eyebrow">你的手牌</p>
              <h3 id="hand-title">尚未入座</h3>
            </div>
            <button id="expose-button" type="button" class="secondary hidden">卖选中牌</button>
          </div>
          <div id="hand" class="hand"></div>
        </section>

        <aside class="side-panel">
          <section>
            <h3>卖牌</h3>
            <div id="exposed-list" class="pill-list"></div>
          </section>
          <section>
            <h3>计分预览</h3>
            <div id="score-preview" class="mini-score"></div>
          </section>
          <section>
            <h3>最新动态</h3>
            <div id="messages" class="messages"></div>
          </section>
          <section>
            <h3>房间聊天</h3>
            <div id="chat-list" class="chat-list"></div>
            <form id="chat-form" class="chat-form">
              <input id="chat-input" maxlength="200" autocomplete="off" placeholder="输入消息" />
              <button type="submit">发送</button>
            </form>
            <div id="voice-status" class="voice-status">语音未开启</div>
          </section>
        </aside>
      </section>

      <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-card">
          <header class="modal-head">
            <h2 id="modal-title">历史</h2>
            <button id="modal-close" type="button" class="secondary">关闭</button>
          </header>
          <div id="modal-body" class="modal-body"></div>
        </div>
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
